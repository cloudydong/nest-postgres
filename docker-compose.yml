version: "3"
services:
  nest:
    build: .
    ports:
      - 3000:3000
    volumes:
      - ./nuber:/usr/src/app
    restart: always
    depends_on:
      - "db-postgres"
  db-postgres:
    image: postgres
    ports:
      - "5432:5432"
    restart: always
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=root
      - POSTGRES_DB=root
  pgadmin-compose:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: "test@gmail.com"
      PGADMIN_DEFAULT_PASSWORD: "test123!"
    ports:
      - "16543:80"
    depends_on:
      - db-postgres
